# Full sync: extract + migrate (no incremental)
# Run this FIRST to create the sync manifest. Then use workflow-nick-jordan-incremental.yaml
# to test incremental (re-extract + migrate with --incremental).

workflow:
  steps:
    - extract-source
    - migrate

source:
  projectKey: 
  domain: app.launchdarkly.com

destination:
  projectKey:   
  domain: app.launchdarkly.com

extraction:
  includeSegments: true

migration:
  migrateSegments: true
  assignMaintainerIds: false
  incremental: true  # Only sync flags/segments changed since last run

  # Include only these flag keys (optional — omit to migrate all)
  # includeFlags:
  #   - feature-one
  #   - feature-two

  # Exclude these flag keys (optional)
  # excludeFlags:
  #   - deprecated-flag

  # Migrate up to N flags in parallel (optional, default: 10)
  # concurrency: 10
